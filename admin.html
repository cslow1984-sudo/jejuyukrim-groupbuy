<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주육림 공동구매 관리자</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  padding:40px;
  margin:0;
}

h1{
  margin-bottom:10px;
}

h2{
  margin-top:0;
}

button{
  padding:10px 20px;
  margin-right:10px;
  margin-bottom:10px;
  cursor:pointer;
  border:1px solid #999;
  background:#fff;
  font-size:14px;
}

input[type="password"]{
  width:100%;
  max-width:360px;
  padding:12px;
  font-size:16px;
  border:1px solid #ccc;
  box-sizing:border-box;
  margin-bottom:12px;
}

#count{
  margin:10px 0 20px 0;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}

th,td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
  font-size:14px;
}

th{
  background:#222;
  color:white;
}

.hidden{
  display:none;
}

.login-box{
  max-width:500px;
  background:white;
  padding:30px;
  border:1px solid #ddd;
}

.notice{
  font-size:13px;
  color:#666;
  margin-top:8px;
  line-height:1.6;
}

.error-text{
  color:#d93025;
  font-size:14px;
  margin-top:8px;
}

@media (max-width: 768px){
  body{
    padding:20px 12px;
  }

  h1{
    font-size:28px;
    line-height:1.3;
  }

  .table-wrap{
    overflow-x:auto;
  }

  table{
    min-width:900px;
  }

  th, td{
    font-size:13px;
    padding:8px;
  }

  .login-box{
    padding:20px;
  }
}
</style>
</head>

<body>

<div id="loginArea" class="login-box">
  <h1>제주육림 관리자 로그인</h1>
  <p>관리자 비밀번호를 입력해주세요.</p>

  <input
    type="password"
    id="adminPassword"
    placeholder="관리자 비밀번호 입력"
    onkeydown="if(event.key==='Enter'){checkPassword();}"
  >

  <br>
  <button onclick="checkPassword()">입장하기</button>

  <div id="loginError" class="error-text"></div>

  <div class="notice">
    현재 버전은 1차 관리자 페이지입니다.<br>
    추후 정식 로그인 방식으로 고도화 가능합니다.
  </div>
</div>

<div id="adminArea" class="hidden">
  <h1>제주육림 공동구매 주문 관리</h1>

  <button onclick="loadOrders()">주문 불러오기</button>
  <button onclick="downloadExcel()">엑셀 다운로드</button>
  <button onclick="logoutAdmin()">로그아웃</button>

  <div id="count">총 주문 : 0건</div>

  <div class="table-wrap">
    <table id="ordersTable">
      <thead>
        <tr>
          <th>주문시간</th>
          <th>주문자명</th>
          <th>연락처</th>
          <th>부위</th>
          <th>중량</th>
          <th>수령매장</th>
          <th>결제방식</th>
          <th>요청사항</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL = "https://jujdlznyoddugfpprbrg.supabase.co";
const SUPABASE_KEY = "sb_publishable_SR1mAWxL3e4rUzG-icOU-A_nExPpzXJ";

/* 여기 비밀번호만 원하는 값으로 바꾸시면 됩니다 */
const ADMIN_PASSWORD = "jejuyookrim9900!";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let ordersData = [];

function formatDate(dateString){
  if(!dateString) return "";
  const date = new Date(dateString);

  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  const hours = String(date.getHours()).padStart(2, "0");
  const minutes = String(date.getMinutes()).padStart(2, "0");
  const seconds = String(date.getSeconds()).padStart(2, "0");

  return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}

function checkPassword(){
  const enteredPassword = document.getElementById("adminPassword").value;
  const loginError = document.getElementById("loginError");

  if(enteredPassword !== ADMIN_PASSWORD){
    loginError.innerText = "비밀번호가 올바르지 않습니다.";
    return;
  }

  loginError.innerText = "";
  sessionStorage.setItem("jejuyukrim_admin_auth", "true");

  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("adminArea").classList.remove("hidden");

  loadOrders();
}

function logoutAdmin(){
  sessionStorage.removeItem("jejuyukrim_admin_auth");
  document.getElementById("adminArea").classList.add("hidden");
  document.getElementById("loginArea").classList.remove("hidden");
  document.getElementById("adminPassword").value = "";
  document.getElementById("loginError").innerText = "";
}

function restoreAdminSession(){
  const isAuthed = sessionStorage.getItem("jejuyukrim_admin_auth");

  if(isAuthed === "true"){
    document.getElementById("loginArea").classList.add("hidden");
    document.getElementById("adminArea").classList.remove("hidden");
    loadOrders();
  }
}

async function loadOrders(){

  const { data, error } = await supabaseClient
    .from("orders")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    alert("주문 불러오기 실패");
    console.log(error);
    return;
  }

  ordersData = data || [];

  const tbody = document.querySelector("#ordersTable tbody");
  tbody.innerHTML = "";

  if(ordersData.length === 0){
    const tr = document.createElement("tr");
    tr.innerHTML = `<td colspan="8">주문 데이터가 없습니다.</td>`;
    tbody.appendChild(tr);
    document.getElementById("count").innerText = "총 주문 : 0건";
    return;
  }

  ordersData.forEach(order => {

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${formatDate(order.created_at)}</td>
      <td>${order.customer_name ?? ""}</td>
      <td>${order.phone ?? ""}</td>
      <td>${order.part ?? ""}</td>
      <td>${order.weight ?? ""}</td>
      <td>${order.pickup_store ?? ""}</td>
      <td>${order.payment_method ?? ""}</td>
      <td>${order.memo ?? ""}</td>
    `;

    tbody.appendChild(tr);

  });

  document.getElementById("count").innerText = "총 주문 : " + ordersData.length + "건";
}

function downloadExcel(){

  if(!ordersData.length){
    alert("다운로드할 주문 데이터가 없습니다. 먼저 주문을 불러와주세요.");
    return;
  }

  const exportData = ordersData.map(order => ({
    주문시간: formatDate(order.created_at),
    주문자명: order.customer_name ?? "",
    연락처: order.phone ?? "",
    부위: order.part ?? "",
    중량: order.weight ?? "",
    수령매장: order.pickup_store ?? "",
    결제방식: order.payment_method ?? "",
    요청사항: order.memo ?? ""
  }));

  const worksheet = XLSX.utils.json_to_sheet(exportData);
  const workbook = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(workbook, worksheet, "orders");
  XLSX.writeFile(workbook, "jejuyukrim_orders.xlsx");
}

restoreAdminSession();
</script>

</body>
</html>
