<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제주육림 공동구매 주문서</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
padding:40px 20px;
}

.wrap{
max-width:700px;
margin:0 auto;
}

.card{
background:#1e1e1e;
border-radius:20px;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:14px;
border-radius:10px;
border:none;
box-sizing:border-box;
font-size:16px;
}

textarea{
min-height:100px;
resize:vertical;
}

button{
width:100%;
margin-top:24px;
padding:16px;
font-size:18px;
border:none;
border-radius:10px;
background:#c89b3c;
color:white;
cursor:pointer;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.notice{
margin-top:20px;
font-size:14px;
color:#ccc;
line-height:1.6;
}

.info-text{
margin-top:10px;
font-size:14px;
color:#c89b3c;
line-height:1.6;
}

.error-text{
margin-top:10px;
font-size:14px;
color:#ff6b6b;
line-height:1.6;
}
</style>

</head>

<body>

<div class="wrap">

<div class="card">

<h1>제주육림 공동구매 주문서</h1>

<div id="roundInfo" class="info-text">공동구매 정보를 불러오는 중입니다.</div>
<div id="loadError" class="error-text"></div>

<label for="name">주문자명</label>
<input id="name" type="text" placeholder="이름을 입력하세요">

<label for="phone">연락처</label>
<input id="phone" type="text" placeholder="010-0000-0000">

<label for="part">부위 선택</label>
<select id="part">
<option>불러오는 중...</option>
</select>

<label for="weight">중량 선택</label>
<select id="weight">
<option>500g</option>
<option>1kg</option>
</select>

<label for="store">수령 매장</label>
<select id="store">
<option>외도점</option>
<option>서사라점</option>
<option>도남점</option>
</select>

<label for="payment">결제 방식</label>
<select id="payment">
<option>매장 결제</option>
<option>계좌 이체</option>
</select>

<label for="memo">요청사항</label>
<textarea id="memo" placeholder="예: 오후 3시 이후 방문 예정"></textarea>

<button id="submitBtn" onclick="submitOrder()">주문 접수하기</button>

<div class="notice">
공동구매 주문 접수 후 담당자가 확인합니다.<br>
계좌이체 선택 시 입금 확인 후 주문이 확정됩니다.
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://jujdlznyoddugfpprbrg.supabase.co"
const SUPABASE_KEY = "sb_publishable_SR1mAWxL3e4rUzG-icOU-A_nExPpzXJ"

const TELEGRAM_BOT_TOKEN = "8751658229:AAEXi1BFJ73hkOL4E5c8qm_OrfpZU0DxQ3U"
const TELEGRAM_CHAT_ID = "8661434326"

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let currentRound = null
let loadedProducts = []

function setLoadError(message){
  document.getElementById("loadError").innerText = message || ""
}

function setRoundInfo(message){
  document.getElementById("roundInfo").innerText = message || ""
}

function setSubmitDisabled(disabled){
  document.getElementById("submitBtn").disabled = disabled
}

async function loadActiveRoundAndProducts(){
  setLoadError("")
  setSubmitDisabled(true)

  const partSelect = document.getElementById("part")
  partSelect.innerHTML = "<option>불러오는 중...</option>"

  const { data: roundData, error: roundError } = await supabaseClient
    .from("purchase_rounds")
    .select("*")
    .eq("status", "open")
    .order("id", { ascending: false })
    .limit(1)
    .single()

  if(roundError || !roundData){
    setRoundInfo("현재 진행 중인 공동구매가 없습니다.")
    setLoadError("진행 중인 공동구매 회차를 찾을 수 없습니다.")
    partSelect.innerHTML = "<option>진행 중인 공동구매 없음</option>"
    return
  }

  currentRound = roundData

  setRoundInfo(
    `${roundData.title} / 수령기간: ${formatDate(roundData.pickup_start_at)} ~ ${formatDate(roundData.pickup_end_at)}`
  )

  const { data: productData, error: productError } = await supabaseClient
    .from("products")
    .select("*")
    .eq("round_id", currentRound.id)
    .eq("is_active", true)
    .order("sort_order", { ascending: true })

  if(productError){
    setLoadError("상품 목록을 불러오지 못했습니다.")
    partSelect.innerHTML = "<option>상품 불러오기 실패</option>"
    return
  }

  loadedProducts = productData || []

  if(!loadedProducts.length){
    setLoadError("등록된 상품이 없습니다.")
    partSelect.innerHTML = "<option>등록된 상품 없음</option>"
    return
  }

  partSelect.innerHTML = ""

  loadedProducts.forEach(product => {
    const option = document.createElement("option")
    option.value = product.name
    option.textContent = product.name
    partSelect.appendChild(option)
  })

  setSubmitDisabled(false)
}

function formatDate(value){
  if(!value) return "-"
  const date = new Date(value)

  const year = date.getFullYear()
  const month = String(date.getMonth() + 1).padStart(2, "0")
  const day = String(date.getDate()).padStart(2, "0")

  return `${year}-${month}-${day}`
}

async function sendTelegramAlert(data){

const message =
`📦 제주육림 공동구매 주문

주문자: ${data.name}
연락처: ${data.phone}
부위: ${data.part}
중량: ${data.weight}
수령매장: ${data.store}
결제방식: ${data.payment}
요청사항: ${data.memo || "없음"}`

const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`

await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:TELEGRAM_CHAT_ID,
text:message
})
})

}

async function submitOrder(){

const name = document.getElementById("name").value.trim()
const phone = document.getElementById("phone").value.trim()
const part = document.getElementById("part").value
const weight = document.getElementById("weight").value
const store = document.getElementById("store").value
const payment = document.getElementById("payment").value
const memo = document.getElementById("memo").value.trim()

if(!name || !phone){
alert("주문자명과 연락처를 입력해주세요")
return
}

if(!currentRound){
alert("현재 진행 중인 공동구매가 없습니다.")
return
}

const { error } = await supabaseClient
.from("orders")
.insert([
{
customer_name:name,
phone:phone,
part:part,
weight:weight,
pickup_store:store,
payment_method:payment,
memo:memo,
round_id: currentRound.id,
order_summary: `${part} ${weight}`
}
])

if(error){
console.log(error)
alert("주문 저장 실패")
return
}

await sendTelegramAlert({
name,
phone,
part,
weight,
store,
payment,
memo
})

alert("주문이 접수되었습니다")

document.getElementById("name").value=""
document.getElementById("phone").value=""
document.getElementById("memo").value=""

}

loadActiveRoundAndProducts()

</script>

</body>
</html>
