<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제주육림 공동구매 주문서</title>
  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#111;
      color:white;
      padding:40px 20px;
    }
    .wrap{
      max-width:700px;
      margin:0 auto;
    }
    .card{
      background:#1e1e1e;
      border-radius:20px;
      padding:30px;
    }
    h1{
      text-align:center;
      margin-bottom:30px;
    }
    label{
      display:block;
      margin-top:18px;
      margin-bottom:8px;
      font-weight:bold;
    }
    input, select, textarea{
      width:100%;
      padding:14px;
      border-radius:10px;
      border:none;
      box-sizing:border-box;
      font-size:16px;
    }
    textarea{
      min-height:100px;
      resize:vertical;
    }
    button{
      width:100%;
      margin-top:24px;
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:10px;
      background:#c89b3c;
      color:white;
      cursor:pointer;
    }
    .notice{
      margin-top:20px;
      font-size:14px;
      color:#ccc;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>제주육림 공동구매 주문서</h1>

      <label for="name">주문자명</label>
      <input id="name" type="text" placeholder="이름을 입력하세요">

      <label for="phone">연락처</label>
      <input id="phone" type="text" placeholder="010-0000-0000">

      <label for="part">부위 선택</label>
      <select id="part">
        <option>꽃등심</option>
        <option>채끝</option>
        <option>안심</option>
        <option>국거리</option>
      </select>

      <label for="weight">중량 선택</label>
      <select id="weight">
        <option>500g</option>
        <option>1kg</option>
      </select>

      <label for="store">수령 매장</label>
      <select id="store">
        <option>외도점</option>
        <option>서사라점</option>
        <option>도남점</option>
      </select>

      <label for="payment">결제 방식</label>
      <select id="payment">
        <option>매장 결제</option>
        <option>계좌 이체</option>
      </select>

      <label for="memo">요청사항</label>
      <textarea id="memo" placeholder="예: 오후 3시 이후 방문 예정"></textarea>

      <button onclick="submitOrder()">주문 접수하기</button>

      <div class="notice">
        공동구매 주문 접수 후 담당자가 확인합니다.<br>
        계좌이체 선택 시 입금 확인 후 주문이 확정됩니다.
      </div>
    </div>
  </div>

  <script>
    function submitOrder() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;

      if (!name || !phone) {
        alert('주문자명과 연락처를 입력해주세요.');
        return;
      }

      alert('주문이 접수되었습니다. 현재는 테스트 버전입니다.');
    }
  </script>
</body>
</html>
